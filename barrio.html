<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis de Barrio</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── Layout específico de barrio ────────────────────────────────────────── */
    .barrio-layout {
      display: flex;
      height: calc(100vh - var(--topbar-h, 52px) - var(--nav-h, 36px));
      overflow: hidden;
    }

    .barrio-sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--bg-card, #fff);
      border-right: 1px solid var(--border, #e2e8f0);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .barrio-map-wrap {
      flex: 1;
      position: relative;
    }

    #barrioMap {
      width: 100%;
      height: 100%;
    }

    /* ── Panel de control ───────────────────────────────────────────────────── */
    .barrio-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border, #e2e8f0);
    }

    .barrio-panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted, #64748b);
      margin-bottom: 10px;
    }

    /* ── Instrucciones / estado ─────────────────────────────────────────────── */
    .barrio-instruction {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      background: var(--bg-subtle, #f8fafc);
      border: 1px solid var(--border, #e2e8f0);
      font-size: 13px;
      color: var(--text, #1e293b);
      line-height: 1.45;
    }

    .barrio-instruction.drawing {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1e40af;
    }

    .barrio-instruction.ready {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534;
    }

    .barrio-instruction.loading {
      background: #fefce8;
      border-color: #fde68a;
      color: #854d0e;
    }

    .barrio-instruction-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .vertex-count {
      font-weight: 700;
    }

    /* ── Botones ────────────────────────────────────────────────────────────── */
    .barrio-btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .barrio-btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border, #e2e8f0);
      background: var(--bg-card, #fff);
      color: var(--text, #1e293b);
      transition: background 0.15s, border-color 0.15s;
    }

    .barrio-btn:hover:not(:disabled) {
      background: var(--bg-subtle, #f8fafc);
    }

    .barrio-btn.primary {
      background: #3b82f6;
      color: #fff;
      border-color: #3b82f6;
    }

    .barrio-btn.primary:hover:not(:disabled) {
      background: #2563eb;
      border-color: #2563eb;
    }

    .barrio-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Panel de resultados ────────────────────────────────────────────────── */
    .barrio-results {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .barrio-results-empty {
      color: var(--text-muted, #64748b);
      font-size: 13px;
      text-align: center;
      margin-top: 24px;
    }

    .barrio-results-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text, #1e293b);
    }

    .barrio-raw-json {
      background: var(--bg-subtle, #f8fafc);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 6px;
      padding: 12px;
      font-size: 11px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 60vh;
      overflow-y: auto;
      color: var(--text, #1e293b);
    }

    .barrio-copy-btn {
      align-self: flex-end;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border, #e2e8f0);
      background: var(--bg-card, #fff);
      color: var(--text, #1e293b);
    }

    .barrio-copy-btn:hover {
      background: var(--bg-subtle, #f8fafc);
    }

    /* ── Spinner ────────────────────────────────────────────────────────────── */
    .barrio-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fde68a;
      border-top-color: #854d0e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      margin-top: 2px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cursor crosshair en modo dibujo ────────────────────────────────────── */
    .barrio-map-wrap.drawing #barrioMap { cursor: crosshair !important; }
    .barrio-map-wrap.drawing .leaflet-interactive { cursor: crosshair !important; }
  </style>
</head>
<body>
  <nav class="app-nav">
    <a href="index.html"       class="nav-link">Venta</a>
    <a href="renta.html"       class="nav-link">Renta</a>
    <a href="multifamily.html" class="nav-link">Multifamily</a>
    <a href="oficinas.html"    class="nav-link">Oficinas</a>
    <a href="barrio.html"      class="nav-link active">Barrio</a>
  </nav>

  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>Análisis de Barrio</h1>
    </div>
  </header>

  <div class="barrio-layout">

    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <aside class="barrio-sidebar">

      <!-- Controles de dibujo -->
      <div class="barrio-panel">
        <div class="barrio-panel-title">Zona de análisis</div>

        <div id="barrioInstruction" class="barrio-instruction">
          <span class="barrio-instruction-icon">✏️</span>
          <span id="barrioInstructionText">
            Haz clic en <strong>Dibujar zona</strong> y luego marca los vértices en el mapa. Cierra el polígono haciendo clic sobre el primer punto.
          </span>
        </div>

        <div class="barrio-btn-row">
          <button id="btnDraw"   class="barrio-btn primary">Dibujar zona</button>
          <button id="btnClear"  class="barrio-btn" disabled>Borrar</button>
        </div>
        <div class="barrio-btn-row">
          <button id="btnClose"  class="barrio-btn" disabled>Cerrar polígono</button>
          <button id="btnQuery"  class="barrio-btn primary" disabled>Consultar POIs</button>
        </div>
      </div>

      <!-- Resultados -->
      <div class="barrio-results" id="barrioResults">
        <p class="barrio-results-empty">Los resultados de la API aparecerán aquí.</p>
      </div>

    </aside>

    <!-- ── Mapa ─────────────────────────────────────────────────────────────── -->
    <div class="barrio-map-wrap" id="barrioMapWrap">
      <div id="barrioMap"></div>
    </div>

  </div>

  <script type="module" src="js/barrio/main.js"></script>
</body>
</html>
